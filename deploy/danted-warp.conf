# systemd drop-in: route the Dante SOCKS5 server's egress through the WARP tunnel.
#
# Unlike MTProto, Dante CAN bind its egress source: set `external: 172.16.0.2` (the
# WARP config's [Interface] Address) in /etc/danted.conf — replacing the WAN device
# (e.g. `external: eth0`). Its packets then leave with src == tunnel IP, which the
# single `from <tunnel-ip>` rule installed by vpnbot-warp-routes diverts into the
# tunnel; no NAT is needed. danted.conf is NOT bot-managed — this external= line is
# a manual prerequisite (see docs/warp.md, "WARP proxy egress").
#
# This drop-in only fixes ORDERING: Dante must start after the out-warp interface
# exists (so it can bind 172.16.0.2) and after the routing rule is installed.
#
# Install:
#   install -m 700 -d /etc/systemd/system/danted.service.d
#   install -m 644 deploy/danted-warp.conf /etc/systemd/system/danted.service.d/vpnbot-warp.conf
#   systemctl daemon-reload && systemctl restart danted
[Unit]
After=awg-quick@out-warp.service warp-routes.service
Wants=awg-quick@out-warp.service
