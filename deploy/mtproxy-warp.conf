# systemd drop-in: route the MTProto proxy's egress through the WARP tunnel.
#
# MTProto/mtg cannot bind its egress source to the tunnel IP, so vpn-bot-warp-routes
# masks it with a cgroup-mark (fwmark 0x2 on this unit's cgroup) + an explicit SNAT
# to the tunnel IP. The `-m cgroup --path system.slice/<unit>.service` match can
# only be inserted while the cgroup exists — i.e. while mtg is running — so the
# rule is (re)asserted from this unit's ExecStartPost once it has started.
#
# The ExecStartPost uses the `+` prefix so it runs as ROOT even though the main
# process drops to User=mtproxy, and `-` so a failure never fails the unit. It is
# idempotent and a no-op on a host without WARP proxy egress.
#
# Install (substitute <unit> if MTPROTO_SERVICE_NAME is not the default "mtproxy"):
#   install -m 700 -d /etc/systemd/system/mtproxy.service.d
#   install -m 644 deploy/mtproxy-warp.conf /etc/systemd/system/mtproxy.service.d/vpn-bot-warp.conf
#   systemctl daemon-reload && systemctl restart mtproxy
[Unit]
After=warp-routes.service awg-quick@out-warp.service
Wants=warp-routes.service

[Service]
ExecStartPost=-+/usr/local/sbin/vpn-bot-warp-routes proxy-add out-warp
