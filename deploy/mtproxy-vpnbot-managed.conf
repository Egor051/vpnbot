[Service]
# Root-wrapper model: clear any User=/Group= inherited from the base mtproxy unit
# so the wrapper runs as root. It then reads the root-owned managed env/secrets and
# starts the proxy with `-u` (MTPROTO_RUN_USER) so the proxy process drops privileges
# internally (see deploy/run-mtproxy-managed and docs/proxy.md). The wrapper is
# root:root 0700 and the managed files are root-owned, so a non-root User= here would
# fail to exec the wrapper or read those files.
User=
Group=
ExecStart=
ExecStart=/opt/vpn-service/scripts/run-mtproxy-managed
