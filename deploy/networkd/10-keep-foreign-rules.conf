# Stop systemd-networkd from flushing routing state it did not create.
#
# systemd-networkd defaults to ManageForeignRoutingPolicyRules=yes and
# ManageForeignRoutes=yes, meaning that whenever it (re)starts it REMOVES every
# `ip rule` / `ip route` not created by networkd itself. The WARP data plane is
# exactly such foreign state: awg-quick@out-warp + vpn-bot-warp-routes install the
# `from <client-subnet>` / `from <tunnel-ip>` policy rules by hand. On 2026-07-24 an
# unattended libpam upgrade cascaded a restart into systemd-networkd, which came up
# with the defaults and wiped those rules — AWG clients silently egressed direct for
# days while the tunnel table and warp-routes.service both still looked healthy.
#
# Install as a drop-in so it merges over /etc/systemd/networkd.conf:
#   install -o root -g root -m 0644 deploy/networkd/10-keep-foreign-rules.conf \
#       /etc/systemd/networkd.conf.d/10-keep-foreign-rules.conf
#   systemctl restart systemd-networkd   # (or reboot) to apply
#
# Verify it is merged and active:
#   systemd-analyze cat-config systemd/networkd.conf | grep -i ManageForeign
[Network]
ManageForeignRoutingPolicyRules=no
ManageForeignRoutes=no
