name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints-hashed.txt
            requirements-dev.txt
            constraints-dev-hashed.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r constraints-hashed.txt
          python -m pip install --require-hashes -r constraints-dev-hashed.txt

      - name: Audit pinned runtime dependency set
        # `make audit` carries the documented --ignore-vuln list (see Makefile).
        run: make audit

  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints-hashed.txt
            requirements-dev.txt
            constraints-dev-hashed.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r constraints-hashed.txt
          python -m pip install --require-hashes -r constraints-dev-hashed.txt

      - name: Run static checks (ruff — style, security, bugbear)
        run: python -m ruff check .

      - name: Compile Python files
        run: python -m compileall .

      - name: Type check with mypy (strict)
        run: python -m mypy --strict bot/ services/ adapters/ config/ models/ utils/ repositories/ main.py init_db.py

      - name: Run tests with coverage
        run: python -m pytest --cov=. --cov-report=term-missing --cov-fail-under=60
