name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints-hashed.txt
            requirements-dev.txt
            constraints-dev-hashed.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r constraints-hashed.txt
          python -m pip install --require-hashes -r constraints-dev-hashed.txt

      - name: Audit pinned runtime dependency set
        # `make audit` runs pip-audit over requirements.txt + constraints.txt with
        # no --ignore-vuln exceptions (see Makefile).
        run: make audit

  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints-hashed.txt
            requirements-dev.txt
            constraints-dev-hashed.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r constraints-hashed.txt
          python -m pip install --require-hashes -r constraints-dev-hashed.txt

      - name: Run static checks (ruff — style, security, bugbear)
        run: python -m ruff check .

      - name: Compile Python files
        run: python -m compileall .

      - name: Type check with mypy (strict)
        run: python -m mypy --strict bot/ services/ adapters/ config/ models/ utils/ repositories/ db/ hy2_auth/ subscription_server/ warp/ main.py init_db.py

      - name: Run tests with coverage
        run: python -m pytest --cov=. --cov-report=term-missing --cov-fail-under=62

  tests-host-like:
    # Reproduces the environment in which scripts/deploy.sh Phase 1 runs pytest on
    # the real host: the AmneziaWG tunnel (out-warp) and client (awg0) netdevs
    # EXIST there, so the warp helpers' /sys/class/net/<iface>/statistics
    # fast-paths are live. Plain CI has no such interfaces, so those branches never
    # execute and host-only leaks (e.g. the counter-based self-check reading the
    # live-but-flat /sys and ignoring the test's injected growth) pass in CI yet
    # fail on the host at deploy time. This job materialises the interfaces so the
    # same /sys branches run in CI as on the host, turning that whole class of
    # host-leak regressions into a PRE-MERGE gate instead of a Phase 1 surprise.
    name: Tests (host-like — deploy Phase 1 env)
    runs-on: ubuntu-latest
    needs: [dependency-audit]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints-hashed.txt
            requirements-dev.txt
            constraints-dev-hashed.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r constraints-hashed.txt
          python -m pip install --require-hashes -r constraints-dev-hashed.txt

      - name: Materialise the tunnel/client interfaces (reproduce the deploy host)
        # dummy netdevs give the helpers a live /sys/class/net/<iface>/statistics
        # (flat counters, exactly like an idle tunnel on the host). No traffic is
        # needed — presence of the /sys tree is what flips the helper onto its
        # host-only code path.
        run: |
          sudo ip link add out-warp type dummy
          sudo ip link add awg0 type dummy
          sudo ip link set out-warp up
          sudo ip link set awg0 up
          test -r /sys/class/net/out-warp/statistics/rx_bytes
          test -r /sys/class/net/awg0/statistics/rx_bytes

      - name: Run tests (mirror deploy Phase 1 — deterministic, no pytest cache)
        # Same invocation as scripts/deploy.sh Phase 1 (`-p no:cacheprovider`, no
        # xdist, no randomly) so CI reproduces that gate 1:1 — now WITH the tunnel
        # interfaces present. If either determinism plugin is ever added it must go
        # to deploy.sh, the `tests` job AND here, or the three stop reproducing.
        run: python -m pytest -q -p no:cacheprovider
