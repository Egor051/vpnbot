name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -c constraints.txt
          python -m pip install -r requirements-dev.txt

      - name: Run minimal static check
        run: python -m ruff check . --select=E9,F63,F7,F82

      - name: Compile Python files
        run: python -m compileall .

      - name: Type check with mypy
        run: python -m mypy bot/ services/ adapters/ config/ models/ utils/ repositories/

      - name: Run tests with coverage
        run: python -m pytest --cov=. --cov-report=term-missing --cov-fail-under=50

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -c constraints.txt
          python -m pip install -r requirements-dev.txt

      - name: Audit pinned runtime dependency set
        run: python -m pip_audit -r requirements.txt -r constraints.txt
