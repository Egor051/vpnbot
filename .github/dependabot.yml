version: 2
updates:
  # NOTE: pip PRs bump requirements*.txt only. The hashed constraints
  # (constraints-hashed.txt / -dev / constraints.txt) are NOT regenerated by
  # Dependabot, so `--require-hashes` CI will fail until a maintainer runs
  # `make update-hashes` (under Python 3.12) and pushes the result onto the PR.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
